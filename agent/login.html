<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REQUITY | Agent Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-blue: #07366E;
      --primary-blue: #1E3F7A;
      --accent-orange: #FF7500;
      --white: #FFFFFF;
      --soft-blue: #EEF4FB;
      --light-surface: #F3F7FC;
      --blue-border: #D3E0F2;
      --primary-text: #102033;
      --secondary-text: #4A607C;
      --requity-blue: #003366;
      --requity-orange: #FF6A00;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 20px rgba(7, 54, 110, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      color: var(--primary-text);
      background: var(--light-surface);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .re, .uity { font-family: 'Nunito', sans-serif; }
    .auth-shell { width: 100%; max-width: 460px; }
    .logo {
      display: flex; align-items: baseline; justify-content: center;
      font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--requity-blue); line-height: 1; margin-bottom: 1.75rem;
    }
    .q-container { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 0.9em; height: 0.9em; margin: 0 0.05em; transform: translateY(0.05em); color: var(--requity-orange); }
    .q-ring { position: absolute; width: 0.85em; height: 0.85em; border: 0.15em solid currentColor; border-radius: 50%; }
    .q-tail { position: absolute; bottom: 0.13em; right: -0.08em; width: 0.5em; height: 0.16em; background-color: currentColor; transform: rotate(42deg); transform-origin: center; border-radius: 1em; }
    .q-container .re-blue { color: var(--requity-blue); }

    .card {
      background: var(--white);
      border: 1px solid var(--blue-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
    }
    .auth-head { text-align: center; margin-bottom: 1.5rem; }
    .auth-head h1 { font-size: 1.4rem; color: var(--deep-blue); margin-bottom: 0.35rem; }
    .auth-head p { color: var(--secondary-text); font-size: 0.92rem; }

    .tabs { display: flex; gap: 0.5rem; background: var(--soft-blue); border-radius: var(--radius-sm); padding: 0.3rem; margin-bottom: 1.5rem; }
    .tab {
      flex: 1; text-align: center; padding: 0.6rem 0.75rem; border: none; cursor: pointer;
      background: transparent; color: var(--secondary-text); font-family: inherit; font-weight: 600;
      font-size: 0.875rem; border-radius: 6px; transition: all 0.2s ease;
    }
    .tab.active { background: var(--white); color: var(--primary-blue); box-shadow: 0 1px 4px rgba(7,54,110,0.08); }

    form { display: none; flex-direction: column; gap: 1rem; }
    form.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--secondary-text); }
    .field .opt { font-weight: 400; color: var(--secondary-text); }
    .field input {
      padding: 0.7rem 0.9rem; border: 1px solid var(--blue-border); border-radius: var(--radius-sm);
      background: var(--light-surface); color: var(--primary-text); font-size: 0.92rem; font-family: inherit; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(30,63,122,0.12); background: var(--white); }
    .row { display: flex; gap: 0.75rem; }
    .row .field { flex: 1; }

    .btn-primary {
      background: var(--accent-orange); color: var(--white); padding: 0.8rem 1.5rem; font-size: 0.95rem;
      border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s ease; margin-top: 0.25rem;
    }
    .btn-primary:hover { background: #E66A00; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }

    .auth-msg { font-size: 0.85rem; padding: 0.7rem 0.85rem; border-radius: var(--radius-sm); display: none; }
    .auth-msg.show { display: block; }
    .auth-msg.error { background: #FCE8E6; color: #B3261E; }
    .auth-msg.success { background: #E6F4EA; color: #137333; }
    .auth-msg.info { background: var(--soft-blue); color: var(--primary-blue); }

    .auth-foot { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--secondary-text); }
    .auth-foot a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
    .auth-foot a:hover { text-decoration: underline; }

    .role-switch { display: none; text-align: center; }
    .role-switch.show { display: block; }
    .role-switch p { color: var(--secondary-text); font-size: 0.92rem; margin-bottom: 1.1rem; }
    .role-switch .btn-primary { display: inline-flex; width: auto; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="logo">
      <span class="re">RE</span>
      <div class="q-container"><div class="q-ring"></div><div class="q-tail"></div></div>
      <span class="uity">UITY</span>
    </div>

    <div class="card">
      <div class="auth-head">
        <h1>Agent access</h1>
        <p>Sign in to your dashboard or create an agent account.</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="signin" type="button">Sign in</button>
        <button class="tab" data-tab="signup" type="button">Create account</button>
      </div>

      <div class="auth-msg" id="auth-msg"></div>

      <div class="role-switch" id="role-switch">
        <p id="role-switch-text">This account has reviewer access. Continue to the Reviewer Portal.</p>
        <a class="btn-primary" id="role-switch-btn" href="../reviewer/index.html">Continue to Reviewer Portal</a>
      </div>

      <form id="signin-form" class="active">
        <div class="field">
          <label for="si-email">Email</label>
          <input type="email" id="si-email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="si-password">Password</label>
          <input type="password" id="si-password" autocomplete="current-password" required />
        </div>
        <button class="btn-primary" type="submit" id="signin-btn">Sign in</button>
      </form>

      <form id="signup-form">
        <div class="field">
          <label for="su-name">Full name</label>
          <input type="text" id="su-name" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="su-email">Email</label>
          <input type="email" id="su-email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="su-password">Password</label>
          <input type="password" id="su-password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="field">
          <label for="su-phone">Phone <span class="opt">(optional)</span></label>
          <input type="tel" id="su-phone" autocomplete="tel" />
        </div>
        <button class="btn-primary" type="submit" id="signup-btn">Create agent account</button>
      </form>

      <div class="auth-foot">
        <span>New to REQUITY? <a href="#" id="to-signup">Create an account</a></span>
      </div>
    </div>
  </div>

  <script src="../frontend/shared/config.js" onerror="this.remove()"></script>
  <script src="../frontend/shared/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var API = window.RequityAPI;
      var msg = document.getElementById("auth-msg");
      var tabs = document.querySelectorAll(".tab");
      var signinForm = document.getElementById("signin-form");
      var signupForm = document.getElementById("signup-form");

      function showMsg(text, kind) {
        msg.textContent = text;
        msg.className = "auth-msg show " + (kind || "info");
      }
      function clearMsg() { msg.className = "auth-msg"; }

      function setTab(name) {
        tabs.forEach(function (t) { t.classList.toggle("active", t.dataset.tab === name); });
        signinForm.classList.toggle("active", name === "signin");
        signupForm.classList.toggle("active", name === "signup");
        clearMsg();
      }
      tabs.forEach(function (t) { t.addEventListener("click", function () { setTab(t.dataset.tab); }); });
      document.getElementById("to-signup").addEventListener("click", function (e) { e.preventDefault(); setTab("signup"); });

      function showReviewerSwitch() {
        clearMsg();
        // Hide the auth forms/tabs and present a clean "go to reviewer portal" panel.
        document.querySelector(".tabs").style.display = "none";
        signinForm.classList.remove("active");
        signupForm.classList.remove("active");
        document.querySelector(".auth-foot").style.display = "none";
        document.getElementById("role-switch").classList.add("show");
      }

      function routeAfterAuth(me) {
        if (me && me.role === "agent") { window.location.href = "dashboard.html"; return; }
        if (me && (me.role === "reviewer" || me.role === "admin")) { showReviewerSwitch(); return; }
        // Unknown/empty role (e.g. brand-new agent just bootstrapped): go to dashboard.
        window.location.href = "dashboard.html";
      }

      signinForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearMsg();
        var btn = document.getElementById("signin-btn");
        btn.disabled = true; btn.textContent = "Signing in...";
        try {
          await API.signIn(document.getElementById("si-email").value.trim(), document.getElementById("si-password").value);
          var me = await API.getCurrentUser();
          if (me && me.needsBootstrap) { await API.bootstrapAgentProfile(null); me = await API.getCurrentUser(); }
          routeAfterAuth(me);
        } catch (err) {
          showMsg(err.message || "Sign in failed.", "error");
          btn.disabled = false; btn.textContent = "Sign in";
        }
      });

      signupForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearMsg();
        var btn = document.getElementById("signup-btn");
        btn.disabled = true; btn.textContent = "Creating account...";
        var profile = {
          fullName: document.getElementById("su-name").value.trim(),
          phone: document.getElementById("su-phone").value.trim() || null,
        };
        try {
          var result = await API.signUpAgent(
            document.getElementById("su-email").value.trim(),
            document.getElementById("su-password").value,
            profile
          );
          if (result && result.needsEmailConfirmation) {
            showMsg("Account created. Check your email to confirm, then sign in.", "success");
            btn.disabled = false; btn.textContent = "Create agent account";
            setTab("signin");
            return;
          }
          window.location.href = "dashboard.html";
        } catch (err) {
          showMsg(err.message || "Sign up failed.", "error");
          btn.disabled = false; btn.textContent = "Create agent account";
        }
      });

      // If already signed in, send straight to the right place.
      if (API && API.hasSession()) {
        API.getCurrentUser().then(function (me) { if (me) routeAfterAuth(me); }).catch(function () {});
      }
    });
  </script>
</body>
</html>
