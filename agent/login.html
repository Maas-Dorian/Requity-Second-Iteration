<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Agent Login | Requity</title>
  <meta name="description" content="Sign in to Requity to access your real estate agent dashboard, client assessments, agent archetype, and client relationship insights." />
  <link rel="canonical" href="https://www.requityapp.com/agent/login.html" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-blue: #07366E;
      --primary-blue: #1E3F7A;
      --accent-orange: #FF7500;
      --white: #FFFFFF;
      --soft-blue: #EEF4FB;
      --light-surface: #F3F7FC;
      --blue-border: #D3E0F2;
      --primary-text: #102033;
      --secondary-text: #4A607C;
      --requity-blue: #003366;
      --requity-orange: #FF6A00;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 20px rgba(7, 54, 110, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      color: var(--primary-text);
      background: var(--light-surface);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .re, .uity { font-family: 'Nunito', sans-serif; }
    .auth-shell { width: 100%; max-width: 460px; }
    .logo {
      display: flex; align-items: baseline; justify-content: center;
      font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--requity-blue); line-height: 1; margin-bottom: 1.75rem;
    }
    .q-container { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 0.9em; height: 0.9em; margin: 0 0.05em; transform: translateY(0.05em); color: var(--requity-orange); }
    .q-ring { position: absolute; width: 0.85em; height: 0.85em; border: 0.15em solid currentColor; border-radius: 50%; }
    .q-tail { position: absolute; bottom: 0.13em; right: -0.08em; width: 0.5em; height: 0.16em; background-color: currentColor; transform: rotate(42deg); transform-origin: center; border-radius: 1em; }
    .q-container .re-blue { color: var(--requity-blue); }

    .card {
      background: var(--white);
      border: 1px solid var(--blue-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
    }
    .auth-head { text-align: center; margin-bottom: 1.5rem; }
    .auth-head h1 { font-size: 1.4rem; color: var(--deep-blue); margin-bottom: 0.35rem; }
    .auth-head p { color: var(--secondary-text); font-size: 0.92rem; }

    .tabs { display: flex; gap: 0.5rem; background: var(--soft-blue); border-radius: var(--radius-sm); padding: 0.3rem; margin-bottom: 1.5rem; }
    .tab {
      flex: 1; text-align: center; padding: 0.6rem 0.75rem; border: none; cursor: pointer;
      background: transparent; color: var(--secondary-text); font-family: inherit; font-weight: 600;
      font-size: 0.875rem; border-radius: 6px; transition: all 0.2s ease;
    }
    .tab.active { background: var(--white); color: var(--primary-blue); box-shadow: 0 1px 4px rgba(7,54,110,0.08); }

    form { display: none; flex-direction: column; gap: 1rem; }
    form.active { display: flex; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--secondary-text); }
    .field .opt { font-weight: 400; color: var(--secondary-text); }
    .field input {
      padding: 0.7rem 0.9rem; border: 1px solid var(--blue-border); border-radius: var(--radius-sm);
      background: var(--light-surface); color: var(--primary-text); font-size: 0.92rem; font-family: inherit; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(30,63,122,0.12); background: var(--white); }
    .row { display: flex; gap: 0.75rem; }
    .row .field { flex: 1; }

    .forgot-row { display: flex; justify-content: flex-end; margin-top: 0.1rem; }
    .link-btn {
      background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;
      color: var(--primary-blue); font-weight: 600; font-size: 0.8rem; text-decoration: none;
    }
    .link-btn:hover { text-decoration: underline; }
    .link-btn:disabled { opacity: 0.6; cursor: default; text-decoration: none; }
    .reset-intro { color: var(--secondary-text); font-size: 0.9rem; margin-bottom: 0.25rem; }

    .terms-field { display: flex; align-items: flex-start; gap: 0.5rem; margin-top: 0.25rem; }
    .terms-field input { margin-top: 0.15rem; width: 1rem; height: 1rem; flex: 0 0 auto; cursor: pointer; }
    .terms-field label { font-size: 0.85rem; color: var(--secondary-text); font-weight: 400; line-height: 1.4; }
    .terms-field a { color: var(--primary-blue); font-weight: 600; }

    .btn-primary {
      background: var(--accent-orange); color: var(--white); padding: 0.8rem 1.5rem; font-size: 0.95rem;
      border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s ease; margin-top: 0.25rem;
    }
    .btn-primary:hover { background: #E66A00; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }

    .auth-msg { font-size: 0.85rem; padding: 0.7rem 0.85rem; border-radius: var(--radius-sm); display: none; }
    .auth-msg.show { display: block; }
    .auth-msg.error { background: #FCE8E6; color: #B3261E; }
    .auth-msg.success { background: #E6F4EA; color: #137333; }
    .auth-msg.info { background: var(--soft-blue); color: var(--primary-blue); }

    .auth-foot { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--secondary-text); }
    .auth-foot a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
    .auth-foot a:hover { text-decoration: underline; }

    .role-switch { display: none; text-align: center; }
    .role-switch.show { display: block; }
    .role-switch p { color: var(--secondary-text); font-size: 0.92rem; margin-bottom: 1.1rem; }
    .role-switch .btn-primary { display: inline-flex; width: auto; text-decoration: none; }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="auth-shell">
    <div class="logo">
      <span class="re">RE</span>
      <div class="q-container"><div class="q-ring"></div><div class="q-tail"></div></div>
      <span class="uity">UITY</span>
    </div>

    <div class="card">
      <div class="auth-head">
        <h1>Agent access</h1>
        <p>Sign in to your dashboard or create an agent account.</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="signin" type="button">Sign in</button>
        <button class="tab" data-tab="signup" type="button">Create account</button>
      </div>

      <div class="auth-msg" id="auth-msg"></div>

      <div class="role-switch" id="role-switch">
        <p id="role-switch-text">This account has reviewer access. Continue to the Reviewer Portal.</p>
        <a class="btn-primary" id="role-switch-btn" href="../reviewer/index.html">Continue to Reviewer Portal</a>
      </div>

      <form id="signin-form" class="active">
        <div class="field">
          <label for="si-email">Email</label>
          <input type="email" id="si-email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="si-password">Password</label>
          <input type="password" id="si-password" autocomplete="current-password" required />
          <div class="forgot-row">
            <button type="button" class="link-btn" id="forgot-password-btn">Forgot password?</button>
          </div>
        </div>
        <button class="btn-primary" type="submit" id="signin-btn">Sign in</button>
      </form>

      <form id="reset-form">
        <p class="reset-intro">Choose a new password for your agent account.</p>
        <div class="field">
          <label for="rs-password">New password</label>
          <input type="password" id="rs-password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="field">
          <label for="rs-password-2">Confirm new password</label>
          <input type="password" id="rs-password-2" autocomplete="new-password" minlength="8" required />
        </div>
        <button class="btn-primary" type="submit" id="reset-btn">Update password</button>
      </form>

      <form id="signup-form">
        <div class="field">
          <label for="su-name">Full name</label>
          <input type="text" id="su-name" autocomplete="name" required />
        </div>
        <div class="field">
          <label for="su-email">Email</label>
          <input type="email" id="su-email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="su-password">Password</label>
          <input type="password" id="su-password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="field">
          <label for="su-phone">Phone <span class="opt">(optional)</span></label>
          <input type="tel" id="su-phone" autocomplete="tel" />
        </div>
        <div class="terms-field">
          <input type="checkbox" id="su-terms" />
          <label for="su-terms">
            I have read and agree to the
            <a href="/legal/requity-terms-of-service.pdf" target="_blank" rel="noopener noreferrer">Terms of Service</a>.
          </label>
        </div>
        <button class="btn-primary" type="submit" id="signup-btn">Create agent account</button>
      </form>

      <div class="auth-foot">
        <span>New to REQUITY? <a href="#" id="to-signup">Create an account</a></span>
      </div>
    </div>
  </div>

  <script src="../frontend/shared/config.js" onerror="this.remove()"></script>
  <script src="../frontend/shared/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var API = window.RequityAPI;
      var msg = document.getElementById("auth-msg");
      var tabs = document.querySelectorAll(".tab");
      var signinForm = document.getElementById("signin-form");
      var signupForm = document.getElementById("signup-form");
      var resetForm = document.getElementById("reset-form");

      // Single in-flight guard shared by BOTH forms. Stops double submits and the
      // Enter-key resubmit from firing a second Supabase auth-email request.
      var isSubmitting = false;
      function dbgAuth(message, data) {
        if (API && API.__debug) { try { API.__debug("agent/login.html", message, data || {}); } catch (e) {} }
      }

      function showMsg(text, kind) {
        msg.textContent = text;
        msg.className = "auth-msg show " + (kind || "info");
      }
      function clearMsg() { msg.className = "auth-msg"; }

      function setTab(name) {
        tabs.forEach(function (t) { t.classList.toggle("active", t.dataset.tab === name); });
        signinForm.classList.toggle("active", name === "signin");
        signupForm.classList.toggle("active", name === "signup");
        if (resetForm) resetForm.classList.remove("active");
        clearMsg();
      }
      tabs.forEach(function (t) { t.addEventListener("click", function () { setTab(t.dataset.tab); }); });
      document.getElementById("to-signup").addEventListener("click", function (e) { e.preventDefault(); setTab("signup"); });

      function showReviewerSwitch() {
        clearMsg();
        // Hide the auth forms/tabs and present a clean "go to reviewer portal" panel.
        document.querySelector(".tabs").style.display = "none";
        signinForm.classList.remove("active");
        signupForm.classList.remove("active");
        document.querySelector(".auth-foot").style.display = "none";
        document.getElementById("role-switch").classList.add("show");
      }

      // Wait until the freshly stored session is actually readable (so the
      // dashboard's own auth gate recognizes it immediately) and then land the
      // agent on the dashboard, never back on this login page.
      async function redirectAfterAuth(target) {
        var dest = target || "dashboard.html";
        // Wait (up to ~3s) for the freshly stored session + /auth/me to be
        // readable, so the destination page's own guard recognizes it
        // immediately and never bounces back here.
        try {
          if (API.waitForAuthMe) await API.waitForAuthMe({ attempts: 15, delayMs: 200 });
          else await API.getCurrentUser();
        } catch (e) { /* proceed; the destination guard will retry too */ }
        dbgAuth("auth:dashboard-redirect", { target: dest });
        window.location.replace(dest);
      }

      // First-time agents (no saved archetype) go straight to the assessment;
      // returning agents who already completed it go to the dashboard. Resolutions
      // agents (@resolutions.realtor) skip the assessment entirely and always land
      // on the dashboard, this is a deliberate bypass, not an auth failure.
      function destinationForAgent(me) {
        var agent = me && me.agent;
        var email = (agent && agent.email) || (me && me.user && me.user.email) || (me && me.email) || null;
        var assessmentDisabled = Boolean(API.isResolutionsAgentEmail && API.isResolutionsAgentEmail(email));
        if (assessmentDisabled) {
          if (localStorage.requity_debug === "1") {
            console.log("agent:assessment-bypass", { assessmentDisabled: true, reason: "resolutions_email_domain" });
          }
          return "dashboard.html";
        }
        var hasCompletedAgentAssessment = Boolean(
          agent && (agent.archetype || agent.archetype_completed_at || agent.archetypeCompletedAt)
        );
        return hasCompletedAgentAssessment ? "dashboard.html" : "assessment.html";
      }

      // Routes to the right place once we have a verified /auth/me payload.
      // Returns false when it couldn't route (so callers can re-enable the form).
      async function routeAfterAuth(me) {
        if (!me) {
          showMsg("We couldn't verify your account. Please try signing in again.", "error");
          return false;
        }
        var role = me.role;
        // Agents and admins use the agent flow. A brand-new agent with no saved
        // archetype is sent to the assessment first; a returning agent goes to
        // the dashboard. We never route to the login page after a good auth.
        if (role === "agent" || role === "admin") {
          var hasAgentRow = me.agent && me.agent.id;
          // Ensure the agent row exists before routing into the agent flow.
          if (!hasAgentRow) {
            try {
              await API.bootstrapAgentProfile(null);
              me = await API.getCurrentUser();
            } catch (e) { /* ignore, handled below */ }
            hasAgentRow = me && me.agent && me.agent.id;
          }
          // An admin still without an agent row is reviewer-only in practice.
          if (!hasAgentRow) {
            if (role === "admin") { showReviewerSwitch(); return true; }
            showMsg("We couldn't set up your agent profile. Please try again.", "error");
            return false;
          }
          await redirectAfterAuth(destinationForAgent(me));
          return true;
        }
        // Reviewer-only accounts get the reviewer portal panel.
        if (role === "reviewer") { showReviewerSwitch(); return true; }
        // Unknown/pending role: don't guess, surface a clear message.
        showMsg("We couldn't verify your account. Please try signing in again.", "error");
        return false;
      }

      signinForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        // Block duplicate submits (rapid clicks / Enter key) so sign-in only
        // ever fires once per attempt.
        if (isSubmitting) { dbgAuth("auth:submit-blocked-duplicate", { mode: "signin" }); return; }
        isSubmitting = true;
        clearMsg();
        dbgAuth("auth:submit-start", { mode: "signin" });
        var btn = document.getElementById("signin-btn");
        var reEnable = function () { isSubmitting = false; btn.disabled = false; btn.textContent = "Sign in"; };
        btn.disabled = true; btn.textContent = "Signing in...";
        try {
          // Exactly one signInWithPassword call. No signup/resend/reset fallback.
          await API.signIn(document.getElementById("si-email").value.trim(), document.getElementById("si-password").value);
          // requireAgentSession distinguishes a 500 (server can't verify) from a
          // 401 (no valid session), so we never clear a good session on a 500.
          var session = await API.requireAgentSession();
          if (session.ok) {
            var routed = await routeAfterAuth(session.me);
            if (!routed) reEnable();
            return;
          }
          if (session.reason === "role_mismatch") { showReviewerSwitch(); return; }
          if (session.reason === "error" || session.reason === "needs_setup") {
            showMsg("We signed you in, but couldn't finish setting up your agent profile. Please try again in a moment.", "error");
          } else {
            showMsg("We couldn't verify your account. Please try signing in again.", "error");
          }
          reEnable();
        } catch (err) {
          // Rate-limit and all other errors: show the message, do NOT auto-retry.
          showMsg(err.message || "Sign in failed.", "error");
          reEnable();
        }
      });

      signupForm.addEventListener("submit", async function (e) {
        e.preventDefault();
        // Block duplicate submits (rapid clicks / Enter key) so signup, and any
        // Supabase confirmation email, only ever fires once per attempt.
        if (isSubmitting) { dbgAuth("auth:submit-blocked-duplicate", { mode: "signup" }); return; }
        clearMsg();
        // Terms of Service are mandatory for account creation. Block the request
        // (no Supabase signup, no profile/agent rows) until the box is checked.
        if (!document.getElementById("su-terms").checked) {
          showMsg("You must agree to the Terms of Service before creating an account.", "error");
          return;
        }
        isSubmitting = true;
        dbgAuth("auth:submit-start", { mode: "signup" });
        var btn = document.getElementById("signup-btn");
        var reEnable = function () { isSubmitting = false; btn.disabled = false; btn.textContent = "Create agent account"; };
        btn.disabled = true; btn.textContent = "Creating account...";
        var profile = {
          fullName: document.getElementById("su-name").value.trim(),
          phone: document.getElementById("su-phone").value.trim() || null,
          termsAccepted: true,
          termsVersion: API.TERMS_VERSION,
        };
        try {
          // Exactly one Supabase signup call. No automatic resend on any outcome.
          var result = await API.signUpAgent(
            document.getElementById("su-email").value.trim(),
            document.getElementById("su-password").value,
            profile
          );
          // No session returned → Supabase "Confirm email" is ON (or no session
          // was minted). Show a clear message; never resend, retry, or redirect.
          if (result && result.needsEmailConfirmation) {
            if (result.confirmationExpected) {
              showMsg("Account created. Check your email to confirm your account, then sign in.", "success");
            } else {
              showMsg("Signup created but no session was returned. Disable email confirmation in Supabase Auth settings or confirm the account by email.", "error");
            }
            reEnable();
            setTab("signin");
            return;
          }
          // New agent is signed in + bootstrapped → route to the dashboard.
          var session = await API.requireAgentSession();
          if (session.ok) {
            var routed = await routeAfterAuth(session.me);
            if (!routed) reEnable();
            return;
          }
          if (session.reason === "role_mismatch") { showReviewerSwitch(); return; }
          if (session.reason === "error" || session.reason === "needs_setup") {
            showMsg("Your account was created, but we couldn't finish setting up your agent profile. Please try again in a moment.", "error");
          } else {
            showMsg("We couldn't verify your new account. Please try signing in.", "error");
          }
          reEnable();
        } catch (err) {
          // Rate-limit and all other errors: show the message, do NOT auto-retry.
          showMsg(err.message || "Sign up failed.", "error");
          reEnable();
        }
      });

      // --- Forgot password ------------------------------------------------
      // Sends the user to the REQUITY-owned reset flow (reset-password.html).
      // The reset email is sent by our own backend through SendGrid, never by
      // the Supabase default mailer.
      var forgotBtn = document.getElementById("forgot-password-btn");
      if (forgotBtn) {
        forgotBtn.addEventListener("click", function () {
          window.location.href = "reset-password.html";
        });
      }

      // --- Reset password mode --------------------------------------------
      // Shows the new-password form (no auto-route to dashboard) and applies the
      // new password using the recovery session from the email link.
      function enterResetMode() {
        clearMsg();
        document.querySelector(".tabs").style.display = "none";
        signinForm.classList.remove("active");
        signupForm.classList.remove("active");
        var foot = document.querySelector(".auth-foot");
        if (foot) foot.style.display = "none";
        if (resetForm) resetForm.classList.add("active");
        var headP = document.querySelector(".auth-head p");
        if (headP) headP.textContent = "Set a new password to finish signing back in.";
      }

      if (resetForm) {
        resetForm.addEventListener("submit", async function (e) {
          e.preventDefault();
          if (isSubmitting) { dbgAuth("auth:submit-blocked-duplicate", { mode: "reset" }); return; }
          var pw = document.getElementById("rs-password").value;
          var pw2 = document.getElementById("rs-password-2").value;
          if (pw.length < 8) { showMsg("Choose a password with at least 8 characters.", "error"); return; }
          if (pw !== pw2) { showMsg("Those passwords don't match. Please re-enter them.", "error"); return; }
          isSubmitting = true;
          var btn = document.getElementById("reset-btn");
          var reEnable = function () { isSubmitting = false; btn.disabled = false; btn.textContent = "Update password"; };
          btn.disabled = true; btn.textContent = "Updating...";
          clearMsg();
          dbgAuth("auth:submit-start", { mode: "reset" });
          try {
            await API.updatePassword(pw);
            showMsg("Password updated. Taking you to your dashboard...", "success");
            await redirectAfterAuth("dashboard.html");
          } catch (err) {
            if (err && err.rateLimited) {
              showMsg("Too many password reset emails requested. Please wait a few minutes before trying again.", "error");
            } else {
              showMsg(err.message || "We couldn't update your password. Request a new reset link and try again.", "error");
            }
            reEnable();
          }
        });
      }

      // Reset mode is entered when the recovery link sends the user back here
      // (?mode=reset-password and/or the recovery tokens in the URL hash). We
      // consume the recovery session and show the new-password form. Crucially we
      // do NOT auto-route to the dashboard in this case (the password isn't set yet).
      var qp = new URLSearchParams(window.location.search);
      // Detect an expired/used recovery link: Supabase returns the failure in the
      // URL hash (#error=...&error_code=...). Surface a clean message, never crash,
      // and strip the hash so no error fragment lingers in the address bar.
      var hashError = null;
      try {
        var rawHash = (window.location.hash || "").replace(/^#/, "");
        if (rawHash) {
          var hp = new URLSearchParams(rawHash);
          if (hp.get("error") || hp.get("error_code")) {
            hashError = hp.get("error_description") || "This password reset link has expired or has already been used.";
            try { window.history.replaceState(null, "", window.location.pathname + window.location.search); } catch (e) {}
          }
        }
      } catch (e) { /* ignore */ }

      var recoveryConsumed = API && API.consumeRecoverySession ? API.consumeRecoverySession() : false;
      var isResetMode = qp.get("mode") === "reset-password" || recoveryConsumed;
      if (isResetMode) {
        enterResetMode();
        if (hashError) {
          showMsg("This password reset link has expired or has already been used. Please request a new one.", "error");
        } else if (!recoveryConsumed && !(API && API.hasSession())) {
          showMsg("Open the password reset link from your email to set a new password.", "info");
        }
        return;
      }

      // If already signed in, send straight to the right place.
      if (API && API.hasSession()) {
        API.getCurrentUser().then(function (me) { if (me) routeAfterAuth(me); }).catch(function () {});
      }
    });
  </script>
</body>
</html>
