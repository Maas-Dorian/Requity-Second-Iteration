<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a New Password | Requity</title>
  <meta name="description" content="Set a new password for your REQUITY account." />
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.requityapp.com/agent/update-password.html" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-blue: #07366E;
      --primary-blue: #1E3F7A;
      --accent-orange: #FF7500;
      --white: #FFFFFF;
      --soft-blue: #EEF4FB;
      --light-surface: #F3F7FC;
      --blue-border: #D3E0F2;
      --primary-text: #102033;
      --secondary-text: #4A607C;
      --requity-blue: #003366;
      --requity-orange: #FF6A00;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 20px rgba(7, 54, 110, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      color: var(--primary-text);
      background: var(--light-surface);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .re, .uity { font-family: 'Nunito', sans-serif; }
    .auth-shell { width: 100%; max-width: 460px; }
    .logo {
      display: flex; align-items: baseline; justify-content: center;
      font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--requity-blue); line-height: 1; margin-bottom: 1.75rem;
    }
    .q-container { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 0.9em; height: 0.9em; margin: 0 0.05em; transform: translateY(0.05em); color: var(--requity-orange); }
    .q-ring { position: absolute; width: 0.85em; height: 0.85em; border: 0.15em solid currentColor; border-radius: 50%; }
    .q-tail { position: absolute; bottom: 0.13em; right: -0.08em; width: 0.5em; height: 0.16em; background-color: currentColor; transform: rotate(42deg); transform-origin: center; border-radius: 1em; }

    .card {
      background: var(--white);
      border: 1px solid var(--blue-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
    }
    .auth-head { text-align: center; margin-bottom: 1.5rem; }
    .auth-head h1 { font-size: 1.4rem; color: var(--deep-blue); margin-bottom: 0.35rem; }
    .auth-head p { color: var(--secondary-text); font-size: 0.92rem; }

    form { display: flex; flex-direction: column; gap: 1rem; }
    form.hidden { display: none; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--secondary-text); }
    .field input {
      padding: 0.7rem 0.9rem; border: 1px solid var(--blue-border); border-radius: var(--radius-sm);
      background: var(--light-surface); color: var(--primary-text); font-size: 0.92rem; font-family: inherit; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .field input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(30,63,122,0.12); background: var(--white); }

    .btn-primary {
      background: var(--accent-orange); color: var(--white); padding: 0.8rem 1.5rem; font-size: 0.95rem;
      border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s ease; margin-top: 0.25rem; text-decoration: none; text-align: center; display: block;
    }
    .btn-primary:hover { background: #E66A00; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }

    .auth-msg { font-size: 0.85rem; padding: 0.7rem 0.85rem; border-radius: var(--radius-sm); display: none; margin-bottom: 1rem; }
    .auth-msg.show { display: block; }
    .auth-msg.error { background: #FCE8E6; color: #B3261E; }
    .auth-msg.success { background: #E6F4EA; color: #137333; }
    .auth-msg.info { background: var(--soft-blue); color: var(--primary-blue); }

    .state-panel { display: none; text-align: center; }
    .state-panel.show { display: block; }
    .state-panel p { color: var(--secondary-text); font-size: 0.92rem; margin-bottom: 1.1rem; }
    .state-panel .btn-primary { display: inline-block; width: auto; }

    .auth-foot { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--secondary-text); }
    .auth-foot a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
    .auth-foot a:hover { text-decoration: underline; }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="auth-shell">
    <div class="logo">
      <span class="re">RE</span>
      <div class="q-container"><div class="q-ring"></div><div class="q-tail"></div></div>
      <span class="uity">UITY</span>
    </div>

    <div class="card">
      <div class="auth-head">
        <h1 id="page-title">Choose a new password</h1>
        <p id="page-sub">Enter a new password for your REQUITY account.</p>
      </div>

      <div class="auth-msg" id="auth-msg"></div>

      <form id="update-form">
        <div class="field">
          <label for="up-password">New password</label>
          <input type="password" id="up-password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="field">
          <label for="up-password-2">Confirm new password</label>
          <input type="password" id="up-password-2" autocomplete="new-password" minlength="8" required />
        </div>
        <button class="btn-primary" type="submit" id="up-btn">Update password</button>
      </form>

      <!-- Shown when the token is missing, invalid, expired, or already used. -->
      <div class="state-panel" id="invalid-panel">
        <p>This reset link is invalid or expired. Request a new password reset link.</p>
        <a class="btn-primary" href="reset-password.html">Request a new link</a>
      </div>

      <!-- Shown after a successful password update. -->
      <div class="state-panel" id="success-panel">
        <p>Your password has been updated. You can sign in now.</p>
        <a class="btn-primary" href="login.html">Go to sign in</a>
      </div>

      <div class="auth-foot">
        <a href="login.html">Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="../frontend/shared/config.js" onerror="this.remove()"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var form = document.getElementById("update-form");
      var msg = document.getElementById("auth-msg");
      var btn = document.getElementById("up-btn");
      var invalidPanel = document.getElementById("invalid-panel");
      var successPanel = document.getElementById("success-panel");
      var pageSub = document.getElementById("page-sub");
      var isSubmitting = false;

      var cfg = window.REQUITY_CONFIG || {};
      var apiBase = String(cfg.apiBaseUrl || "/api").replace(/\/$/, "");

      function showMsg(text, kind) {
        msg.textContent = text;
        msg.className = "auth-msg show " + (kind || "info");
      }
      function clearMsg() { msg.className = "auth-msg"; }

      function showInvalidState() {
        form.classList.add("hidden");
        successPanel.classList.remove("show");
        invalidPanel.classList.add("show");
        pageSub.textContent = "The link you opened cannot be used.";
        clearMsg();
      }

      function showSuccessState() {
        form.classList.add("hidden");
        invalidPanel.classList.remove("show");
        successPanel.classList.add("show");
        pageSub.textContent = "You are all set.";
        clearMsg();
      }

      var token = new URLSearchParams(window.location.search).get("token") || "";
      if (!token) {
        showInvalidState();
        return;
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        if (isSubmitting) return;
        var pw = document.getElementById("up-password").value;
        var pw2 = document.getElementById("up-password-2").value;
        if (pw.length < 8) {
          showMsg("Choose a password with at least 8 characters.", "error");
          return;
        }
        if (pw !== pw2) {
          showMsg("Those passwords do not match. Please re-enter them.", "error");
          return;
        }
        isSubmitting = true;
        btn.disabled = true;
        btn.textContent = "Updating...";
        clearMsg();
        try {
          var res = await fetch(apiBase + "/auth/complete-password-reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token, password: pw, confirmPassword: pw2 })
          });
          var data = null;
          try { data = await res.json(); } catch (err) {}
          if (res.ok && data && data.ok) {
            showSuccessState();
            return;
          }
          if (data && data.code === "INVALID_TOKEN") {
            showInvalidState();
            return;
          }
          if (res.status === 429) {
            showMsg("Too many attempts. Please wait a few minutes and try again.", "error");
          } else {
            showMsg((data && data.error) || "We could not update your password. Please try again.", "error");
          }
        } catch (err) {
          showMsg("We could not reach the server. Please check your connection and try again.", "error");
        }
        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = "Update password";
      });
    });
  </script>
</body>
</html>
