<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REQUITY | Reviewer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@800&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-blue: #07366E;
      --primary-blue: #1E3F7A;
      --accent-orange: #FF7500;
      --white: #FFFFFF;
      --soft-blue: #EEF4FB;
      --light-surface: #F3F7FC;
      --blue-border: #D3E0F2;
      --primary-text: #102033;
      --secondary-text: #4A607C;
      --requity-blue: #003366;
      --requity-orange: #FF6A00;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 20px rgba(7, 54, 110, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      color: var(--primary-text);
      background: var(--light-surface);
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .re, .uity { font-family: 'Nunito', sans-serif; }
    .auth-shell { width: 100%; max-width: 440px; }
    .logo {
      display: flex; align-items: baseline; justify-content: center;
      font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em;
      color: var(--requity-blue); line-height: 1; margin-bottom: 0.5rem;
    }
    .q-container { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 0.9em; height: 0.9em; margin: 0 0.05em; transform: translateY(0.05em); color: var(--requity-orange); }
    .q-ring { position: absolute; width: 0.85em; height: 0.85em; border: 0.15em solid currentColor; border-radius: 50%; }
    .q-tail { position: absolute; bottom: 0.13em; right: -0.08em; width: 0.5em; height: 0.16em; background-color: currentColor; transform: rotate(42deg); transform-origin: center; border-radius: 1em; }

    .portal-tag {
      text-align: center; margin-bottom: 1.75rem;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--secondary-text);
    }

    .card {
      background: var(--white);
      border: 1px solid var(--blue-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
    }
    .auth-head { text-align: center; margin-bottom: 1.5rem; }
    .auth-head h1 { font-size: 1.4rem; color: var(--deep-blue); margin-bottom: 0.4rem; }
    .auth-head p { color: var(--secondary-text); font-size: 0.92rem; }

    .auth-msg { font-size: 0.85rem; padding: 0.7rem 0.85rem; border-radius: var(--radius-sm); display: none; margin-bottom: 1rem; }
    .auth-msg.show { display: block; }
    .auth-msg.error { background: #FCE8E6; color: #B3261E; }
    .auth-msg.success { background: #E6F4EA; color: #137333; }
    .auth-msg.info { background: var(--soft-blue); color: var(--primary-blue); }

    form { display: flex; flex-direction: column; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--secondary-text); }
    .field input {
      padding: 0.75rem 0.9rem; border: 1px solid var(--blue-border); border-radius: var(--radius-sm);
      background: var(--light-surface); color: var(--primary-text); font-size: 1rem; font-family: inherit; outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease; width: 100%;
    }
    .field input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(30,63,122,0.12); background: var(--white); }

    .btn-primary {
      background: var(--accent-orange); color: var(--white); padding: 0.85rem 1.5rem; font-size: 0.95rem;
      border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s ease; margin-top: 0.25rem; min-height: 48px; width: 100%;
    }
    .btn-primary:hover { background: #E66A00; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }

    .helper-text {
      margin-top: 1.1rem; padding-top: 1.1rem; border-top: 1px solid var(--blue-border);
      text-align: center; font-size: 0.82rem; color: var(--secondary-text);
    }

    .auth-foot { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--secondary-text); }
    .auth-foot a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
    .auth-foot a:hover { text-decoration: underline; }

    .role-switch { display: none; text-align: center; }
    .role-switch.show { display: block; }
    .role-switch p { color: var(--secondary-text); font-size: 0.92rem; margin-bottom: 1.1rem; }
    .role-switch .btn-primary { display: inline-flex; width: auto; text-decoration: none; min-height: 0; }

    @media (max-width: 480px) {
      body { padding: 1.25rem 1rem; align-items: flex-start; }
      .auth-shell { max-width: 100%; }
      .card { padding: 1.5rem 1.25rem; }
      .logo { font-size: 1.7rem; }
      .auth-head h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="logo">
      <span class="re">RE</span>
      <div class="q-container"><div class="q-ring"></div><div class="q-tail"></div></div>
      <span class="uity">UITY</span>
    </div>
    <div class="portal-tag">Reviewer Portal</div>

    <div class="card">
      <div class="auth-head">
        <h1>Reviewer Portal</h1>
        <p>Sign in to review client matches, incomplete assessments, and agent referrals.</p>
      </div>

      <div class="auth-msg" id="auth-msg"></div>

      <div class="role-switch" id="role-switch">
        <p>This account does not have reviewer access.</p>
        <a class="btn-primary" href="../agent/dashboard.html">Go to Agent Dashboard</a>
      </div>

      <form id="signin-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button class="btn-primary" type="submit" id="signin-btn">Sign in</button>
      </form>

      <div class="helper-text">Access is limited to approved REQUITY reviewers and admins.</div>
    </div>

    <div class="auth-foot">
      <span>Are you an agent? <a href="../agent/login.html">Go to the agent portal</a></span>
    </div>
  </div>

  <script src="../frontend/shared/config.js" onerror="this.remove()"></script>
  <script src="../frontend/shared/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var API = window.RequityAPI;
      var msg = document.getElementById("auth-msg");
      var form = document.getElementById("signin-form");

      function showMsg(text, kind) {
        msg.textContent = text;
        msg.className = "auth-msg show " + (kind || "info");
      }
      function clearMsg() { msg.className = "auth-msg"; }

      // Signed in without reviewer access: present a clean panel + Agent Dashboard
      // button. The agent session stays valid so the button works immediately.
      function showAgentSwitch() {
        clearMsg();
        form.style.display = "none";
        document.querySelector(".helper-text").style.display = "none";
        document.getElementById("role-switch").classList.add("show");
      }

      // Returns true when routed (reviewer/admin), false otherwise.
      function routeAfterAuth(me) {
        if (me && (me.role === "reviewer" || me.role === "admin")) {
          window.location.href = "index.html";
          return true;
        }
        return false;
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearMsg();
        var btn = document.getElementById("signin-btn");
        btn.disabled = true; btn.textContent = "Signing in...";
        var resetBtn = function () { btn.disabled = false; btn.textContent = "Sign in"; };
        if (!API) { showMsg("Sign-in is not available in this environment.", "error"); resetBtn(); return; }
        try {
          await API.signIn(document.getElementById("email").value.trim(), document.getElementById("password").value);
          var me = await API.getCurrentUser();
          if (!me) {
            showMsg("We couldn't verify your account. Please try signing in again.", "error");
            resetBtn();
            return;
          }
          if (!routeAfterAuth(me)) {
            // Authenticated but not a reviewer/admin — offer the agent dashboard.
            showAgentSwitch();
          }
        } catch (err) {
          showMsg("We couldn't sign you in. Please check your email and password.", "error");
          resetBtn();
        }
      });

      // If already signed in: reviewer/admin → straight in; agent → switch panel.
      if (API && API.hasSession()) {
        API.getCurrentUser().then(function (me) {
          if (!routeAfterAuth(me) && me && me.role) { showAgentSwitch(); }
        }).catch(function () {});
      }
    });
  </script>
</body>
</html>
